name: CI - Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  unit_and_build:
    name: Unit Tests and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Nota: O repo está na raiz, então o path do lock é direto
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run Unit Tests
        run: npm test

      - name: Build Project
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/
          retention-days: 1

  integration_smoke:
    name: Integration Smoke Test
    needs: unit_and_build
    runs-on: ubuntu-latest
    # Só roda se os secrets de sandbox estiverem configurados
    if: "${{ secrets.VISTA_KEY_SANDBOX != '' }}"
    steps:
      - uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: dist/

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Smoke Test
        env:
          VISTA_URL: ${{ secrets.VISTA_URL_SANDBOX }}
          VISTA_KEY: ${{ secrets.VISTA_KEY_SANDBOX }}
          NODE_ENV: test
        run: python tests/integration/smoke_test_runner.py
